name: macOS GUI

on:
  workflow_dispatch:

jobs:
  gui:
    runs-on: macos-latest
    timeout-minutes: 360

    steps:
      - name: Install tools
        run: |
          brew update
          brew install --cask xpra
          brew install ngrok/ngrok/ngrok

      - name: Check installs
        run: |
          ls -la /Applications/Xpra.app/Contents/MacOS || true
          /Applications/Xpra.app/Contents/MacOS/Xpra --version || true
          ngrok version

      - name: Start XPRA desktop
        run: |
          mkdir -p ~/xpra
          nohup /Applications/Xpra.app/Contents/MacOS/Xpra start :100 \
            --bind-tcp=127.0.0.1:10000 \
            --html=on \
            --daemon=no \
            --start-child="open -a Finder" \
            > xpra.log 2>&1 &

          sleep 15

          echo "=== xpra log ==="
          cat xpra.log || true

          echo "=== listening on 10000 ==="
          lsof -nP -iTCP:10000 -sTCP:LISTEN || true

      - name: Extra diagnostics
        run: |
          echo "=== processes ==="
          ps aux | grep -i '[x]pra' || true
          echo "=== port 10000 ==="
          lsof -nP -iTCP:10000 -sTCP:LISTEN || true

      - name: Write ngrok config
        env:
          NGROK_TOKEN: ${{ secrets.NGROK_TOKEN }}
        run: |
          mkdir -p "$HOME/Library/Application Support/ngrok"

          cat > "$HOME/Library/Application Support/ngrok/ngrok.yml" <<EOF
          version: 3
          agent:
            authtoken: $NGROK_TOKEN
            web_addr: 127.0.0.1:4040
          tunnels:
            gui:
              proto: http
              addr: 127.0.0.1:10000
          EOF

          echo "=== ngrok config ==="
          cat "$HOME/Library/Application Support/ngrok/ngrok.yml"

      - name: Start ngrok
        run: |
          nohup ngrok start --all --log stdout --log-format json > ngrok.log 2>&1 &
          sleep 15

          echo "=== ngrok process ==="
          ps aux | grep '[n]grok' || true

          echo "=== ngrok log ==="
          cat ngrok.log || true

      - name: Query local ngrok API
        run: |
          curl -s http://127.0.0.1:4040/api/tunnels > tunnels.json || true

          echo "=== tunnels.json ==="
          cat tunnels.json || true

          if [ ! -s tunnels.json ]; then
            echo "tunnels.json vacío"
            exit 1
          fi

      - name: Print GUI URL
        run: |
          python3 <<'PY'
          import json
          import sys

          with open("tunnels.json", "r", encoding="utf-8") as f:
              data = json.load(f)

          for t in data.get("tunnels", []):
              url = t.get("public_url", "")
              if t.get("name") == "gui" and (url.startswith("http://") or url.startswith("https://")):
                  print("")
                  print("OPEN MAC DESKTOP:")
                  print("")
                  print(url)
                  print(url + "/")
                  print("")
                  sys.exit(0)

          print("No GUI tunnel found")
          sys.exit(1)
          PY

      - name: Keep runner alive
        run: |
          while true; do
            echo alive
            sleep 60
          done
