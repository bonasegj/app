name: macOS GUI

on:
  workflow_dispatch:

jobs:
  gui:
    runs-on: macos-latest
    timeout-minutes: 360

    steps:

      - name: Install tools
        run: |
          brew update
          brew install xpra
          brew install ngrok/ngrok/ngrok

      - name: Start XPRA desktop
        run: |
          mkdir -p ~/xpra
          nohup xpra start :100 \
            --bind-tcp=127.0.0.1:10000 \
            --html=on \
            --daemon=no \
            --start-child="open -a Finder" \
            > xpra.log 2>&1 &
          sleep 10
          cat xpra.log || true
          lsof -nP -iTCP:10000 -sTCP:LISTEN || true
            - name: Check GUI service
            run: |
              echo "=== listening on 10000 ==="
              lsof -nP -iTCP:10000 -sTCP:LISTEN || true
          
              echo "=== xpra log ==="
              cat xpra.log || true    

      - name: Configure ngrok
        env:
          NGROK_TOKEN: ${{ secrets.NGROK_TOKEN }}
        run: |
          ngrok config add-authtoken "$NGROK_TOKEN"

      - name: Start ngrok tunnel
        run: |
          nohup ngrok http: 127.0.0.1:10000 > ngrok.log 2>&1 &
          sleep 10
          cat ngrok.log

      - name: Print GUI URL
        run: |
          curl -s http://127.0.0.1:4040/api/tunnels > tunnels.json
      
          python3 <<'PY'
          import json, sys
      
          with open("tunnels.json", "r", encoding="utf-8") as f:
              data = json.load(f)
      
          for t in data.get("tunnels", []):
              url = t.get("public_url", "")
              if t.get("proto") == "https":
                  print("")
                  print("OPEN MAC DESKTOP:")
                  print(url)
                  print(url + "/vnc.html")
                  print(url + "/vnc.html?autoconnect=true")
                  print("")
                  sys.exit(0)
      
          print("No HTTPS tunnel found")
          sys.exit(1)
          PY          
      - name: Keep runner alive
        run: |
          while true; do
            echo alive
            sleep 60
          done
