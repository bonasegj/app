name: macOS GUI

on:
  workflow_dispatch:

jobs:
  gui:
    runs-on: macos-latest
    timeout-minutes: 360

    steps:

      - name: Install tools
        run: |
          brew update
          brew install xpra
          brew install ngrok/ngrok/ngrok

      - name: Start XPRA desktop
        run: |
          mkdir -p ~/xpra
          xpra start :100 \
            --bind-tcp=0.0.0.0:10000 \
            --html=on \
            --daemon=no \
            --start-child="open -a Finder" \
            --start-child="open -a Safari" \
            > xpra.log 2>&1 &

          sleep 10
          cat xpra.log || true

      - name: Configure ngrok
        env:
          NGROK_TOKEN: ${{ secrets.NGROK_TOKEN }}
        run: |
          ngrok config add-authtoken "$NGROK_TOKEN"

      - name: Start ngrok tunnel
        run: |
          nohup ngrok http 10000 > ngrok.log 2>&1 &
          sleep 10
          cat ngrok.log

      - name: Print GUI URL
        run: |
          curl -s http://127.0.0.1:4040/api/tunnels > tunnels.json

          python3 <<'PY'
          import json
          
          data=json.load(open("tunnels.json"))
          
          for t in data["tunnels"]:
              if t["proto"]=="https":
                  print("\nOPEN MAC DESKTOP:\n")
                  print(t["public_url"])
                  print("\nUser: runner\n")
          PY
          
                - name: Keep runner alive
                  run: |
          while true; do
            echo alive
            sleep 60
          done
