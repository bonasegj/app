name: macOS SSH

on:
  workflow_dispatch:

jobs:
  remote:
    runs-on: macos-latest
    timeout-minutes: 360

    steps:
      - name: Enable Remote Login
        run: |
          sudo systemsetup -setremotelogin on
          sudo systemsetup -getremotelogin
          sudo lsof -nP -iTCP:22 -sTCP:LISTEN || true

      - name: Install ngrok
        run: |
          brew install ngrok/ngrok/ngrok
          ngrok version

      - name: Configure authorized_keys
        env:
          PUBKEY: ${{ secrets.SSH_PUBLIC_KEY }}
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "$PUBKEY" > ~/.ssh/authorized_keys
          chmod 600 ~/.ssh/authorized_keys

          echo "=== whoami ==="
          whoami
          echo "=== ssh dir ==="
          ls -la ~/.ssh
          echo "=== authorized_keys ==="
          cat ~/.ssh/authorized_keys
          echo "=== fingerprint ==="
          ssh-keygen -lf ~/.ssh/authorized_keys

      - name: Configure sshd
        run: |
          sudo python3 - <<'PY'
          from pathlib import Path
          p = Path("/etc/ssh/sshd_config")
          text = p.read_text()

          replacements = {
              "PubkeyAuthentication": "yes",
              "PasswordAuthentication": "no",
              "KbdInteractiveAuthentication": "no",
              "ChallengeResponseAuthentication": "no",
              "UsePAM": "no",
              "AuthorizedKeysFile": "/Users/runner/.ssh/authorized_keys",
          }

          lines = text.splitlines()
          out = []
          done = {k: False for k in replacements}

          for line in lines:
              stripped = line.strip()
              matched = False
              for k, v in replacements.items():
                  if stripped.startswith(k + " "):
                      out.append(f"{k} {v}")
                      done[k] = True
                      matched = True
                      break
              if not matched:
                  out.append(line)

          for k, v in replacements.items():
              if not done[k]:
                  out.append(f"{k} {v}")

          p.write_text("\n".join(out) + "\n")
          PY

          echo "=== sshd config ==="
          grep -E '^(PubkeyAuthentication|PasswordAuthentication|KbdInteractiveAuthentication|ChallengeResponseAuthentication|UsePAM|AuthorizedKeysFile)' /etc/ssh/sshd_config || true

          sudo launchctl kickstart -k system/com.openssh.sshd || true
          sleep 3
          sudo lsof -nP -iTCP:22 -sTCP:LISTEN || true

      - name: Configure ngrok
        env:
          NGROK_TOKEN: ${{ secrets.NGROK_TOKEN }}
        run: |
          ngrok config add-authtoken "$NGROK_TOKEN"
          nohup ngrok tcp 22 --log stdout > ngrok.log 2>&1 &
          sleep 10
          cat ngrok.log || true
          curl -s http://127.0.0.1:4040/api/tunnels | tee tunnels.json

      - name: Print SSH command
        run: |
          python3 - <<'PY'
          import json
          with open("tunnels.json", "r", encoding="utf-8") as f:
              data = json.load(f)
          for t in data.get("tunnels", []):
              url = t.get("public_url", "")
              if url.startswith("tcp://"):
                  hp = url.replace("tcp://", "")
                  host, port = hp.split(":")
                  print(f"ssh -vvv -o IdentitiesOnly=yes -i C:\\Users\\Jorge\\.ssh\\id_ed25519 runner@{host} -p {port}")
                  break
          PY

      - name: Keep runner alive
        run: |
          while true; do
            echo alive
            date
            sleep 60
          done
