name: macOS SSH + VNC

on:
  workflow_dispatch:

jobs:
  ssh:
    runs-on: macos-latest
    timeout-minutes: 360

    steps:
      - name: Enable Remote Login
        run: |
          sudo systemsetup -setremotelogin on
          sudo systemsetup -getremotelogin
          sudo lsof -nP -iTCP:22 -sTCP:LISTEN || true

      - name: Install ngrok
        run: brew install ngrok/ngrok/ngrok

      - name: Configure SSH authorized_keys
        env:
          PUBKEY: ${{ secrets.SSH_PUBLIC_KEY }}
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "$PUBKEY" > ~/.ssh/authorized_keys
          chmod 600 ~/.ssh/authorized_keys

          sudo mkdir -p /etc/ssh/sshd_config.d
          sudo tee /etc/ssh/sshd_config.d/99-github-actions.conf > /dev/null <<'EOF'
          PubkeyAuthentication yes
          PasswordAuthentication no
          KbdInteractiveAuthentication no
          ChallengeResponseAuthentication no
          UsePAM no
          AuthorizedKeysFile .ssh/authorized_keys
          EOF

          sudo launchctl stop com.openssh.sshd || true
          sudo launchctl start com.openssh.sshd

          echo "=== ~/.ssh ==="
          ls -la ~/.ssh
          echo "=== authorized_keys fingerprint ==="
          ssh-keygen -lf ~/.ssh/authorized_keys || true

      - name: Enable VNC / Remote Management
        run: |
          sudo /System/Library/CoreServices/RemoteManagement/ARDAgent.app/Contents/Resources/kickstart \
            -activate -configure -access -on \
            -users runner -privs -all \
            -restart -agent -menu

          sudo lsof -nP -iTCP:5900 -sTCP:LISTEN || true

          open -a Finder || true
          open -a Safari || true

      - name: Start ngrok tunnels
        env:
          NGROK_TOKEN: ${{ secrets.NGROK_TOKEN }}
        run: |
          ngrok config add-authtoken "$NGROK_TOKEN"

          nohup ngrok tcp 22 --log stdout > ngrok-ssh.log 2>&1 &
          nohup ngrok tcp 5900 --log stdout > ngrok-vnc.log 2>&1 &

          sleep 12

          echo "=== ngrok ssh log ==="
          cat ngrok-ssh.log || true
          echo "=== ngrok vnc log ==="
          cat ngrok-vnc.log || true

      - name: Get tunnel info
        run: |
          curl -s http://127.0.0.1:4040/api/tunnels | tee tunnels.json

      - name: Set VNC password
        run: |
          mkdir -p ~/.vnc
          sudo /System/Library/CoreServices/RemoteManagement/ARDAgent.app/Contents/Resources/kickstart \
            -configure -clientopts -setvnclegacy -vnclegacy yes \
            -setvncpw -vncpw runnerr

      - name: Print connection info
        run: |
          python3 - <<'PY'
          import json, os, sys

          if not os.path.exists("tunnels.json"):
              print("tunnels.json not found")
              sys.exit(1)

          with open("tunnels.json", "r", encoding="utf-8") as f:
              data = json.load(f)

          tunnels = data.get("tunnels", [])
          if not tunnels:
              print("No tunnels found")
              sys.exit(1)

          ssh_url = None
          vnc_url = None

          for t in tunnels:
              public_url = t.get("public_url", "")
              config = t.get("config", {})
              addr = config.get("addr", "")

              if public_url.startswith("tcp://"):
                  if str(addr).endswith(":22") or addr == "localhost:22":
                      ssh_url = public_url
                  elif str(addr).endswith(":5900") or addr == "localhost:5900":
                      vnc_url = public_url

          print("")
          print("=== CONNECTION INFO ===")
          print("")

          if ssh_url:
              hp = ssh_url.replace("tcp://", "")
              host, port = hp.split(":")
              print("SSH:")
              print(f"ssh -o IdentitiesOnly=yes -i ~/.ssh/id_ed25519 runner@{host} -p {port}")
              print("")
          else:
              print("SSH tunnel not found")
              print("")

          if vnc_url:
              hp = vnc_url.replace("tcp://", "")
              host, port = hp.split(":")
              print("VNC:")
              print(f"{host}:{port}")
              print(f"vnc://{host}:{port}")
              print("")
          else:
              print("VNC tunnel not found")
              print("")
          PY

      - name: Keep runner alive
        run: |
          while true; do
            echo alive
            date
            sleep 60
          done
