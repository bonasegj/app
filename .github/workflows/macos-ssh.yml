name: macOS SSH

on:
  workflow_dispatch:

jobs:
  remote:
    runs-on: macos-latest
    timeout-minutes: 360

    steps:
      - name: Enable Remote Login
        run: |
          sudo systemsetup -setremotelogin on
          sudo systemsetup -getremotelogin
          sudo lsof -nP -iTCP:22 -sTCP:LISTEN || true

      - name: Install ngrok
        run: |
          brew install ngrok/ngrok/ngrok
          ngrok version

      - name: Configure authorized_keys
        env:
          PUBKEY: ${{ secrets.SSH_PUBLIC_KEY }}
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "$PUBKEY" > ~/.ssh/authorized_keys
          chmod 600 ~/.ssh/authorized_keys

          echo "=== authorized_keys ==="
          cat ~/.ssh/authorized_keys
          echo "=== fingerprint ==="
          ssh-keygen -lf ~/.ssh/authorized_keys || true

      - name: Configure sshd
        run: |
          sudo python3 - <<'PY'
          from pathlib import Path
          p = Path("/etc/ssh/sshd_config")
          text = p.read_text()

          replacements = {
              "PubkeyAuthentication": "yes",
              "PasswordAuthentication": "no",
              "KbdInteractiveAuthentication": "no",
              "ChallengeResponseAuthentication": "no",
              "UsePAM": "no",
              "AuthorizedKeysFile": "/Users/runner/.ssh/authorized_keys",
          }

          lines = text.splitlines()
          out = []
          done = {k: False for k in replacements}

          for line in lines:
              stripped = line.strip()
              matched = False
              for k, v in replacements.items():
                  if stripped.startswith(k + " "):
                      out.append(f"{k} {v}")
                      done[k] = True
                      matched = True
                      break
              if not matched:
                  out.append(line)

          for k, v in replacements.items():
              if not done[k]:
                  out.append(f"{k} {v}")

          p.write_text("\n".join(out) + "\n")
          PY

          sudo launchctl kickstart -k system/com.openssh.sshd || true
          sleep 3
          sudo lsof -nP -iTCP:22 -sTCP:LISTEN || true

      - name: Start ngrok
        env:
          NGROK_TOKEN: ${{ secrets.NGROK_TOKEN }}
        run: |
          ngrok config add-authtoken "$NGROK_TOKEN"
          nohup ngrok tcp 22 --log stdout > ngrok.log 2>&1 &
          sleep 12

          echo "=== ngrok process ==="
          ps aux | grep '[n]grok' || true

          echo "=== ngrok log ==="
          cat ngrok.log || true

      - name: Get tunnel info
        run: |
          rm -f tunnels.json

          for i in {1..10}; do
            echo "Intento $i..."
            curl -s http://127.0.0.1:4040/api/tunnels > tunnels.json || true

            echo "=== tunnels.json ==="
            cat tunnels.json || true
            echo

            if [ -s tunnels.json ]; then
              if python3 - <<'PY'
import json, sys
try:
    json.load(open("tunnels.json", "r", encoding="utf-8"))
    sys.exit(0)
except Exception:
    sys.exit(1)
PY
              then
                echo "tunnels.json válido"
                exit 0
              fi
            fi

            sleep 3
          done

          echo "No se pudo obtener tunnels.json válido"
          exit 1

      - name: Print SSH command
        run: |
          python3 - <<'PY'
          import json, os, sys

          with open("tunnels.json", "r", encoding="utf-8") as f:
              data = json.load(f)

          for t in data.get("tunnels", []):
              url = t.get("public_url", "")
              if url.startswith("tcp://"):
                  hp = url.replace("tcp://", "")
                  host, port = hp.split(":")
                  print(f"ssh -vvv -o IdentitiesOnly=yes -i C:\\Users\\Jorge\\.ssh\\id_ed25519 runner@{host} -p {port}")
                  sys.exit(0)

          print("No se encontró túnel TCP")
          sys.exit(1)
          PY

      - name: Keep runner alive
        run: |
          while true; do
            echo alive
            date
            sleep 60
          done
