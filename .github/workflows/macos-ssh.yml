name: macOS SSH

on:
  workflow_dispatch:

jobs:
  ssh:
    runs-on: macos-latest
    timeout-minutes: 360

    steps:
      - name: Enable Remote Login
        run: |
          sudo systemsetup -setremotelogin on
          sudo systemsetup -getremotelogin

      - name: Install ngrok
        run: brew install ngrok/ngrok/ngrok

      - name: Configure SSH authorized_keys
        env:
          PUBKEY: ${{ secrets.SSH_PUBLIC_KEY }}
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "$PUBKEY" > ~/.ssh/authorized_keys
          chmod 600 ~/.ssh/authorized_keys

          # Make sshd explicitly allow public-key auth for this session
          sudo bash -c 'cat >> /etc/ssh/sshd_config <<EOF
          PubkeyAuthentication yes
          PasswordAuthentication no
          ChallengeResponseAuthentication no
          UsePAM no
          EOF'

          sudo launchctl stop com.openssh.sshd || true
          sudo launchctl start com.openssh.sshd

      - name: Debug ngrok
        env:
          NGROK_TOKEN: ${{ secrets.NGROK }}
        run: |
          ngrok config add-authtoken "$NGROK_TOKEN"
          ngrok tcp 22 --log stdout
          sleep 10
          curl -s http://127.0.0.1:4040/api/tunnels > tunnels.json
          cat tunnels.json

      - name: Print SSH command
        run: |
          python3 - <<'PY'
          import json
          with open("tunnels.json","r",encoding="utf-8") as f:
              data=json.load(f)
          url=data["tunnels"][0]["public_url"]   # tcp://host:port
          hostport=url.replace("tcp://","")
          host, port = hostport.split(":")
          print(f"ssh runner@{host} -p {port}")
          PY

      - name: Keep runner alive
        run: |
          while true; do
            echo alive
            sleep 60
          done
