name: macOS SSH

on:
  workflow_dispatch:

jobs:
  remote:
    runs-on: macos-latest
    timeout-minutes: 360

    steps:
      - name: Enable Remote Login
        run: |
          sudo systemsetup -setremotelogin on
          sudo systemsetup -getremotelogin
          sudo lsof -nP -iTCP:22 -sTCP:LISTEN || true

      - name: Install ngrok
        run: |
          brew install ngrok/ngrok/ngrok
          ngrok version
          ngrok config check || true

      - name: Configure SSH key
        env:
          PUBKEY: ${{ secrets.SSH_PUBLIC_KEY }}
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "$PUBKEY" > ~/.ssh/authorized_keys
          chmod 600 ~/.ssh/authorized_keys

          echo "=== authorized_keys ==="
          cat ~/.ssh/authorized_keys

          echo "=== fingerprint ==="
          ssh-keygen -lf ~/.ssh/authorized_keys || true

      - name: Configure sshd
        run: |
          sudo sed -i '' 's/^#\?PubkeyAuthentication.*/PubkeyAuthentication yes/' /etc/ssh/sshd_config
          sudo sed -i '' 's/^#\?PasswordAuthentication.*/PasswordAuthentication no/' /etc/ssh/sshd_config

          if ! grep -q '^AuthorizedKeysFile /Users/runner/.ssh/authorized_keys$' /etc/ssh/sshd_config; then
            echo 'AuthorizedKeysFile /Users/runner/.ssh/authorized_keys' | sudo tee -a /etc/ssh/sshd_config
          fi

          sudo launchctl kickstart -k system/com.openssh.sshd || true
          sleep 3

          echo "=== ssh listening ==="
          sudo lsof -nP -iTCP:22 -sTCP:LISTEN || true

      - name: Start ngrok
        env:
          NGROK_TOKEN: ${{ secrets.NGROK_TOKEN }}
        shell: bash
        run: |
          set -x

          ngrok config add-authtoken "$NGROK_TOKEN"

          nohup ngrok tcp 22 --log stdout --log-format json > ngrok.log 2>&1 &
          echo $! > ngrok.pid

          sleep 15

          echo "=== ngrok pid ==="
          cat ngrok.pid || true

          echo "=== ngrok process ==="
          ps -p "$(cat ngrok.pid)" -o pid,ppid,stat,command || true
          ps aux | grep '[n]grok' || true

          echo "=== ngrok log ==="
          cat ngrok.log || true

      - name: Print SSH command from ngrok log
        shell: bash
        run: |
          echo "=== ngrok log again ==="
          cat ngrok.log || true

          URL="$(python3 - <<'PY'
          import json
          
          url = ""
          with open("ngrok.log", "r", encoding="utf-8", errors="ignore") as f:
              for line in f:
                  line = line.strip()
                  if not line:
                      continue
                  try:
                      obj = json.loads(line)
                  except Exception:
                      continue
          
                  msg = str(obj.get("msg", ""))
                  if "started tunnel" in msg.lower() or "started tunnel" == msg.lower():
                      url = obj.get("url", "") or obj.get("public_url", "") or ""
                  if not url:
                      maybe = obj.get("url", "")
                      if isinstance(maybe, str) and maybe.startswith("tcp://"):
                          url = maybe
          
          print(url)
          PY
          )"
          
                    echo "=== extracted url ==="
                    echo "$URL"
          
                    if [ -z "$URL" ]; then
                      echo "No se pudo extraer la URL TCP desde ngrok.log"
                      exit 1
                    fi
          
                    HOSTPORT="${URL#tcp://}"
                    HOST="${HOSTPORT%:*}"
                    PORT="${HOSTPORT##*:}"
          
                    echo ""
                    echo "SSH CONNECT:"
                    echo "ssh -o IdentitiesOnly=yes -i C:\\Users\\Jorge\\.ssh\\id_ed25519 runner@${HOST} -p ${PORT}"
                    echo ""
                          - name: Keep runner alive
                            run: |
                              while true; do
                                echo alive
                                date
                                sleep 60
                              done
